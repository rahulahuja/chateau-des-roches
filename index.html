<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Auto-redirect to /en/ as default. Google will follow hreflang for French users. -->
  <meta http-equiv="refresh" content="0; url=/en/">
  <link rel="canonical" href="https://chateaudesroches.fr/en/">
  <link rel="alternate" hreflang="en" href="https://chateaudesroches.fr/en/">
  <link rel="alternate" hreflang="fr" href="https://chateaudesroches.fr/fr/">
  <link rel="alternate" hreflang="x-default" href="https://chateaudesroches.fr/en/">
  <title>Château des Roches — Crémant de Loire</title>
  <script>
    // Respect browser language preference
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (lang.indexOf('fr') === 0) {
      window.location.replace('/fr/');
    } else {
      window.location.replace('/en/');
    }
  </script>
</head>
<body>
  <p>Redirecting… / Redirection en cours…</p>
  <p><a href="/en/">English</a> | <a href="/fr/">Français</a></p>
</body>
</html>
